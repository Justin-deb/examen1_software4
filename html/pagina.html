<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header
      class="w-full bg-[#020f2b] shadow-xl px-10 py-5 flex items-center justify-between relative"
    >
      <h1 class="text-white text-5xl font-extrabold tracking-wide">Noticias</h1>

      <div class="relative group">
        <button
          class="flex flex-col justify-center items-center gap-1 w-12 h-12 rounded-lg hover:bg-white/10 transition"
        >
          <span class="w-7 h-[3px] bg-white rounded-full"></span>
          <span class="w-7 h-[3px] bg-white rounded-full"></span>
          <span class="w-7 h-[3px] bg-white rounded-full"></span>
        </button>

        <div
          class="absolute right-0 mt-3 w-52 bg-[#071937] border border-white/10 rounded-2xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 overflow-hidden"
        >
          <a
            href="#grid"
            class="block px-6 py-4 text-white hover:bg-cyan-500/20 transition font-medium"
          >
            Grid
          </a>

          <a
            href="#flexbox"
            class="block px-6 py-4 text-white hover:bg-cyan-500/20 transition font-medium"
          >
            Flexbox
          </a>

          <a
            href="#libre"
            class="block px-6 py-4 text-white hover:bg-cyan-500/20 transition font-medium"
          >
            Libre
          </a>
        </div>
      </div>
    </header>

    <section id="grid"></section>
    <section id="flexbox"></section>
    <section id="libre"></section>

    <body class="min-h-screen flex flex-col bg-gray-100">
      <!-- CONTENIDO -->
      <main class="flex-1"></main>

      <footer
        class="w-full bg-[#020f2b] border-t border-white/10 py-6 px-10 flex flex-col items-center gap-5"
      >
        
        <div class="flex items-center gap-8">
          <a href="https://www.facebook.com" target="_blank">
            <img
              src="https://cdn-icons-png.flaticon.com/512/733/733547.png"
              alt="Facebook"
              class="w-8 hover:scale-110 transition duration-300"
            />
          </a>

          <a href="https://www.instagram.com" target="_blank">
            <img
              src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
              alt="Instagram"
              class="w-8 hover:scale-110 transition duration-300"
            />
          </a>

          <a href="https://www.twitter.com" target="_blank">
            <img
              src="https://cdn-icons-png.flaticon.com/512/733/733579.png"
              alt="Twitter"
              class="w-8 hover:scale-110 transition duration-300"
            />
          </a>

          <a href="https://www.youtube.com" target="_blank">
            <img
              src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"
              alt="YouTube"
              class="w-8 hover:scale-110 transition duration-300"
            />
          </a>
        </div>

        <div class="w-full max-w-4xl h-px bg-white/10"></div>

        <p class="text-gray-400 text-sm text-center">
          © 2026 Noticias. Todos los derechos reservados.
        </p>
      </footer>
    </body>
  </body>
</html>
